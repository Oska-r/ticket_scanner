<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure QR Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.5.25/jsrsasign-all-min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f9; }
        #reader { width: 100%; max-width: 500px; margin: auto; border-radius: 10px; overflow: hidden; }
        #result { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; white-space: pre-wrap; }
        .valid { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .invalid { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

    <h1>Ticket Validator</h1>
    <div id="reader"></div>
    <div id="result"></div>

    <script>
        // MUST MATCH YOUR PYTHON SECRET KEY EXACTLY
        const SECRET_KEY = "6d0rDrJRjKzNPb7nDyx9vR9URYNHCUnDduuvm";

        function verifyTicketJS(scannedToken) {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';

            try {
                // Verify the JWT signature and expiration
                // ALGORITHM: HS256
                const isValid = KJUR.jws.JWS.verifyJWT(scannedToken, {utf8: SECRET_KEY}, {alg: ['HS256']});

                if (isValid) {
                    // Decode the payload to show the user data
                    const headerObj = KJUR.jws.JWS.readSafeJSONString(b64utoutf8(scannedToken.split(".")[0]));
                    const payloadObj = KJUR.jws.JWS.readSafeJSONString(b64utoutf8(scannedToken.split(".")[1]));

                    // Check expiration manually (jsrsasign verifyJWT usually handles this, but let's be safe)
                    const now = Math.floor(Date.now() / 1000);
                    if (payloadObj.exp && payloadObj.exp < now) {
                        throw new Error("Expired");
                    }

                    resultDiv.className = 'valid';
                    resultDiv.innerText = `✅ Access Granted!\nOwner: ${payloadObj.user}\nID: ${payloadObj.t_id}`;
                    
                    // Here is where you'd send a fetch() to tell your computer it was scanned!
                    syncWithComputer(payloadObj.t_id);

                } else {
                    throw new Error("Invalid Signature");
                }
            } catch (e) {
                resultDiv.className = 'invalid';
                resultDiv.innerText = e.message === "Expired" 
                    ? "❌ Denied: This ticket has expired." 
                    : "❌ Denied: Fake or tampered ticket.";
            }
        }

        async function syncWithComputer(ticketId) {
            console.log("Sending check-in for ticket:", ticketId);
            // Optional: fetch('https://your-api.com/checkin', { method: 'POST', ... })
        }

        // Initialize Scanner
        let scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        scanner.render((text) => verifyTicketJS(text), (err) => {});
    </script>
</body>
</html>
